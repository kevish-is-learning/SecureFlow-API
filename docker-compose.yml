version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secureflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secureflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: secureflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: secureflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/secureflow?schema=public
      JWT_SECRET: ${JWT_SECRET:-please-change-me-in-production-32-chars-min}
      JWT_EXPIRES_IN: 1d
      BCRYPT_SALT_ROUNDS: 10
      CORS_ORIGIN: http://localhost:5173
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 60
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 200
      LOG_LEVEL: info
    ports:
      - '4000:4000'

volumes:
  postgres_data:
