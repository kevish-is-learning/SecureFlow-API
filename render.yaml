services:
  - type: web
    name: secureflow-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: secureflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: secureflow-redis
          property: connectionString
      - key: REDIS_ENABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        # Asterisk * is fine, but you should update this to your Vercel URL once known
        value: "*"

  - type: redis
    name: secureflow-redis
    plan: free
    ipAllowList: [] # Restrict to internal Render services

databases:
  - name: secureflow-db
    databaseName: secureflow
    user: secureflow
    plan: free
    ipAllowList: [] # Restrict to internal Render services
